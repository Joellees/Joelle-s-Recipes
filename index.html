<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Joelle's home baking recipes — with serving scaler and healthier versions." />
  <meta name="theme-color" content="#faf8f4" />
  <title>Joelle's Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf7f1;
      --bg-card: #ffffff;
      --ink: #1a1613;
      --ink-soft: #6b5f54;
      --ink-mute: #a89a8d;
      --line: #e8dfd1;
      --line-soft: #f0e8da;
      --accent: #b8502a;
      --accent-soft: #fbece2;
      --healthier: #3f7a52;
      --healthier-soft: #e8f1ea;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
      min-height: 100vh;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    /* ---------- Top bar ---------- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .brand {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .brand-dot { color: var(--accent); }
    .back-link {
      font-size: 0.82rem;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 0.5rem 0.25rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--ink); }
    /* ---------- Home ---------- */
    .home-hero {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 0 0.5rem;
    }
    .home-hero h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 2.75rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .home-hero p {
      color: var(--ink-soft);
      font-size: 1rem;
      max-width: 36ch;
      margin: 0 auto;
    }
    .section-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--line);
    }
    .recipe-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .recipe-card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.15s, transform 0.15s;
    }
    .recipe-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .recipe-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .recipe-card-emoji {
      font-size: 1.9rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .recipe-card-body { flex: 1; min-width: 0; }
    .recipe-card-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .recipe-card-summary {
      color: var(--ink-soft);
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .recipe-card-arrow {
      color: var(--ink-mute);
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    /* ---------- Recipe page ---------- */
    .recipe-head {
      text-align: center;
      margin-bottom: 1.75rem;
      padding: 0 0.25rem;
    }
    .recipe-emoji {
      font-size: 2.6rem;
      line-height: 1;
      margin-bottom: 0.75rem;
    }
    .recipe-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 5.5vw, 2.4rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }
    .recipe-summary {
      color: var(--ink-soft);
      font-size: 0.95rem;
      font-style: italic;
      max-width: 40ch;
      margin: 0 auto;
    }
    /* Scaler */
    .scaler {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .scaler-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .scaler-value {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 0.15rem;
    }
    .scaler-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .scaler-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      font-size: 1.2rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .scaler-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .scaler-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .scaler-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .scaler-count {
      min-width: 1.75rem;
      text-align: center;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.25rem;
    }
    /* Alternate version link */
    .alternate-link {
      display: block;
      text-align: center;
      padding: 0.85rem 1rem;
      margin: 1rem 0 2rem;
      border-radius: 10px;
      background: var(--healthier-soft);
      border: 1px solid var(--healthier);
      color: var(--healthier);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.92rem;
      transition: background 0.15s;
    }
    .alternate-link:hover { background: #dce9de; }
    .alternate-link.is-original {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }
    .alternate-link.is-original:hover { background: #f7dfd0; }
    /* Section dividers */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 2rem 0 1rem;
      padding-bottom: 0.55rem;
      border-bottom: 2px solid var(--ink);
    }
    .section-divider-emoji {
      font-size: 1.35rem;
      line-height: 1;
    }
    .section-divider-text {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
    }
    /* Ingredients list */
    .ingredients {
      list-style: none;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.5rem 1rem;
    }
    .ingredients li {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 0.96rem;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .ingredients li:last-child { border-bottom: none; }
    .ingredients li::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 0.55rem;
    }
    .ingredient-amount {
      font-weight: 600;
      color: var(--ink);
    }
    .ingredient-metric {
      color: var(--ink-mute);
      font-size: 0.88em;
    }
    .ingredient-name {
      color: var(--ink);
    }
    /* Method list */
    .method {
      list-style: none;
      counter-reset: step;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .method li {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 1rem 1.1rem 1rem 3.1rem;
      position: relative;
      font-size: 0.96rem;
      line-height: 1.55;
      counter-increment: step;
    }
    .method li::before {
      content: counter(step);
      position: absolute;
      left: 1rem;
      top: 0.95rem;
      width: 1.6rem;
      height: 1.6rem;
      border-radius: 50%;
      background: var(--ink);
      color: var(--bg);
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .method strong {
      font-weight: 600;
      color: var(--ink);
      background: var(--accent-soft);
      padding: 0.05em 0.35em;
      border-radius: 4px;
      white-space: normal;
    }
    /* Footer alternate */
    .footer-alternate {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      text-align: center;
    }
    /* Hidden helper */
    .hidden { display: none !important; }
    /* Focus-visible for keyboard users */
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    /* Small screens */
    @media (max-width: 480px) {
      .app { padding: 1.25rem 1rem 3rem; }
      .topbar { margin-bottom: 1.5rem; }
      .method li { padding: 0.95rem 1rem 0.95rem 2.9rem; }
    }
  </style>
</head>

    // Order that appears on the home page — only the 4 canonical recipes.
    const HOME_RECIPE_SLUGS = ['simple-white-bread', 'chocolate-chip-bread', 'flatbread', 'third-flatbread', 'croissants', 'banana-choc-chip-bread'];

    // ============================================================
    // Formatting
    // ============================================================
    const VULGAR_FRACTIONS = [
      [1/8, '⅛'], [1/4, '¼'], [1/3, '⅓'], [3/8, '⅜'],
      [1/2, '½'], [5/8, '⅝'], [2/3, '⅔'], [3/4, '¾'], [7/8, '⅞'],
    ];

    // Format a volume/count amount using vulgar fractions when close.
    function formatAmount(v) {
      if (v == null || isNaN(v)) return '';
      if (v === 0) return '0';

      const whole = Math.floor(v);
      const frac = v - whole;
      const tolerance = 0.04;

      // Nearly integer
      if (frac < tolerance) return String(whole);
      if (frac > 1 - tolerance) return String(whole + 1);

      // Match vulgar fraction
      let best = null, bestDiff = tolerance;
      for (const [val, sym] of VULGAR_FRACTIONS) {
        const diff = Math.abs(frac - val);
        if (diff < bestDiff) { bestDiff = diff; best = sym; }
      }
      if (best) return whole ? `${whole}${best}` : best;

      // Fallback: decimal (max 2 places, trim trailing zeros)
      const rounded = Math.round(v * 100) / 100;
      return String(rounded).replace(/\.?0+$/, '');
    }

    // Format a metric amount (grams / ml) with size-aware rounding.
    function formatMetric(v) {
      if (v == null || isNaN(v)) return '';
      if (v < 1) return (Math.round(v * 10) / 10).toString();
      if (v < 20) return String(Math.round(v * 2) / 2); // nearest 0.5
      if (v < 100) return String(Math.round(v));
      return String(Math.round(v / 5) * 5); // nearest 5
    }

    function pluralize(ing, scaledAmount) {
      if (scaledAmount > 1 && ing.plural) return ing.plural;
      return ing.name;
    }

    // Render an ingredient as a rich HTML string:
    //   "<span class='ingredient-amount'>2 tsp</span>
    //    <span class='ingredient-metric'>(6g)</span>
    //    <span class='ingredient-name'>yeast</span>"
    function renderIngredient(ing, multiplier) {
      const amount = ing.amount * multiplier;
      const metric = ing.metric * multiplier;
      const name = pluralize(ing, amount);
      return (
        `<span class="ingredient-amount">${formatAmount(amount)} ${ing.unit}</span> ` +
        `<span class="ingredient-metric">(${formatMetric(metric)}${ing.metricUnit})</span> ` +
        `<span class="ingredient-name">${escapeHtml(name)}</span>`
      );
    }

    // Render an ingredient as a compact inline string for method steps.
    function renderIngredientInline(ing, multiplier) {
      const amount = ing.amount * multiplier;
      const metric = ing.metric * multiplier;
      const name = pluralize(ing, amount);
      return `${formatAmount(amount)} ${ing.unit} (${formatMetric(metric)}${ing.metricUnit}) ${escapeHtml(name)}`;
    }

    function renderMethodStep(step, ingredients, multiplier) {
      const byId = Object.fromEntries(ingredients.map(i => [i.id, i]));
      return step.replace(/\{(\w+)\}/g, (_, id) => {
        const ing = byId[id];
        if (!ing) return `{${id}}`;
        return `<strong>${renderIngredientInline(ing, multiplier)}</strong>`;
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ============================================================
    // Views
    // ============================================================
    const viewEl = document.getElementById('view');
    const backLink = document.getElementById('backLink');

    function renderHome() {
      backLink.classList.add('hidden');
      const cards = HOME_RECIPE_SLUGS.map(slug => {
        const r = RECIPES[slug];
        return `
          <a class="recipe-card" href="#/recipe/${slug}">
            <span class="recipe-card-emoji" aria-hidden="true">${r.emoji}</span>
            <div class="recipe-card-body">
              <div class="recipe-card-name">${escapeHtml(r.name)}</div>
              <div class="recipe-card-summary">${escapeHtml(r.summary)}</div>
            </div>
            <span class="recipe-card-arrow" aria-hidden="true">→</span>
          </a>`;
      }).join('');

      viewEl.innerHTML = `
        <section class="home-hero">
          <h1>A small shelf of<br/>baking recipes.</h1>
          <p>Scale any recipe by servings. Every original has a healthier variant — one tap away.</p>
        </section>
        <div class="section-title">The Collection</div>
        <div class="recipe-grid">${cards}</div>
      `;
      document.title = "Joelle's Recipes";
      window.scrollTo(0, 0);
    }

    function renderRecipe(slug) {
      const r = RECIPES[slug];
      if (!r) { window.location.hash = '#/'; return; }

      backLink.classList.remove('hidden');
      const state = { servings: r.defaultServings };

      function paint() {
        const multiplier = state.servings / r.defaultServings;
        const servingWord = state.servings === 1 ? r.servingLabel : r.servingLabelPlural;

        const ingredientsHtml = r.ingredients.map(ing =>
          `<li>${renderIngredient(ing, multiplier)}</li>`
        ).join('');

        const methodHtml = r.method.map(step =>
          `<li>${renderMethodStep(step, r.ingredients, multiplier)}</li>`
        ).join('');

        const alt = r.alternate;
        const altClass = alt.kind === 'original' ? 'alternate-link is-original' : 'alternate-link';
        const alternateLink = `
          <a class="${altClass}" href="#/recipe/${alt.slug}">
            ${escapeHtml(alt.label)} →
          </a>`;

        viewEl.innerHTML = `
          <article>
            <header class="recipe-head">
              <div class="recipe-emoji" aria-hidden="true">${r.emoji}</div>
              <h1 class="recipe-name">${escapeHtml(r.name)}</h1>
              <p class="recipe-summary">${escapeHtml(r.summary)}</p>
            </header>

            <div class="scaler" role="group" aria-label="Serving size scaler">
              <div>
                <div class="scaler-label">Makes</div>
                <div class="scaler-value" id="servingsText">${state.servings} ${servingWord}</div>
              </div>
              <div class="scaler-controls">
                <button class="scaler-btn" id="decBtn" aria-label="Fewer servings">−</button>
                <span class="scaler-count" aria-live="polite">${state.servings}</span>
                <button class="scaler-btn" id="incBtn" aria-label="More servings">+</button>
              </div>
            </div>

            ${alternateLink}

            <div class="section-divider">
              <span class="section-divider-emoji" aria-hidden="true">🧂</span>
              <span class="section-divider-text">Ingredients</span>
            </div>
            <ul class="ingredients">${ingredientsHtml}</ul>

            <div class="section-divider">
              <span class="section-divider-emoji" aria-hidden="true">👩‍🍳</span>
              <span class="section-divider-text">Method</span>
            </div>
            <ol class="method">${methodHtml}</ol>

            <div class="footer-alternate">${alternateLink}</div>
          </article>
        `;

        const incBtn = document.getElementById('incBtn');
        const decBtn = document.getElementById('decBtn');
        incBtn.disabled = state.servings >= r.maxServings;
        decBtn.disabled = state.servings <= r.minServings;
        incBtn.onclick = () => {
          if (state.servings < r.maxServings) { state.servings += 1; paint(); }
        };
        decBtn.onclick = () => {
          if (state.servings > r.minServings) { state.servings -= 1; paint(); }
        };
      }

      paint();
      document.title = `${r.name} · Joelle's Recipes`;
      window.scrollTo(0, 0);
    }

    // ============================================================
    // Router
    // ============================================================
    function route() {
      const hash = window.location.hash || '#/';
      const match = hash.match(/^#\/recipe\/([a-z0-9-]+)$/);
      if (match) {
        renderRecipe(match[1]);
      } else {
        renderHome();
      }
    }

    window.addEventListener('hashchange', route);
    route();
  </script>
