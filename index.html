<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Joelle's home baking recipes — with serving scaler and healthier versions." />
  <meta name="theme-color" content="#faf7f1" />
  <title>Joelle's Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf7f1;
      --bg-card: #ffffff;
      --ink: #1a1613;
      --ink-soft: #6b5f54;
      --ink-mute: #a89a8d;
      --line: #e8dfd1;
      --line-soft: #f0e8da;
      --accent: #b8502a;
      --accent-soft: #fbece2;
      --healthier: #3f7a52;
      --healthier-soft: #e8f1ea;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
      min-height: 100vh;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    /* ---------- Top bar ---------- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .brand {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      line-height: 1;
      color: var(--ink);
      text-decoration: none;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
    }
    .brand:hover { color: var(--accent); }
    .back-link {
      font-size: 0.82rem;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 0.5rem 0.25rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--ink); }
    /* ---------- Home ---------- */
    .home-hero {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 0 0.5rem;
    }
    .home-hero h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 2.75rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .home-hero p {
      color: var(--ink-soft);
      font-size: 1rem;
      max-width: 36ch;
      margin: 0 auto;
    }
    .section-title {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--line);
    }
    .recipe-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .recipe-card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.15s, transform 0.15s;
    }
    .recipe-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .recipe-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .recipe-card-emoji {
      font-size: 1.9rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .recipe-card-body { flex: 1; min-width: 0; }
    .recipe-card-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .recipe-card-summary {
      color: var(--ink-soft);
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .recipe-card-arrow {
      color: var(--ink-mute);
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    /* Add-a-recipe card on home */
    .add-card {
      border-style: dashed;
      background: var(--bg);
    }
    .add-card:hover { border-style: solid; }
    .add-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--ink);
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .add-card:hover .add-card-icon {
      background: var(--ink);
      color: var(--bg-card);
      border-color: var(--ink);
    }
    /* Add-recipe page */
    .add-page {
      max-width: 540px;
      margin: 0 auto;
    }
    .add-page h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.8rem;
      line-height: 1.15;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    .add-page .add-sub {
      color: var(--ink-soft);
      font-size: 0.92rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .add-form {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
    }
    .add-form label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .add-form textarea {
      width: 100%;
      min-height: 110px;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.95rem;
      background: var(--bg);
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.55;
    }
    .add-form textarea:focus { border-color: var(--accent); }
    .add-form input[type="password"],
    .add-form input[type="text"] {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1rem;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .add-form input[type="password"]:focus,
    .add-form input[type="text"]:focus { border-color: var(--accent); }
    .add-form-error {
      color: #8a1a1a;
      background: #fdf0f0;
      border: 1px solid #f0c8c8;
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
      font-size: 0.85rem;
      margin-top: 0.6rem;
    }
    .add-form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.85rem;
      flex-wrap: wrap;
    }
    .add-generate {
      background: var(--ink);
      color: var(--bg-card);
      border: none;
      padding: 0.65rem 1.3rem;
      border-radius: 999px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .add-generate:hover:not(:disabled) { background: #3a2e28; }
    .add-generate:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Chat UI */
    .chat-page {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 8rem);
    }
    .chat-head { margin-bottom: 1rem; }
    .chat-head h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.7rem;
      line-height: 1.15;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }
    .chat-head .add-sub {
      color: var(--ink-soft);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .chat-messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1rem 0;
      min-height: 18rem;
    }
    .chat-empty {
      color: var(--ink-mute);
      font-size: 0.9rem;
      text-align: center;
      padding: 2.5rem 1rem;
      background: var(--bg-card);
      border: 1px dashed var(--line);
      border-radius: 12px;
    }
    .chat-msg { display: flex; flex-direction: column; gap: 0.4rem; max-width: 100%; }
    .chat-msg-user { align-items: flex-end; }
    .chat-msg-assistant { align-items: flex-start; }
    .chat-bubble {
      max-width: 85%;
      padding: 0.7rem 0.95rem;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .chat-bubble-user {
      background: var(--ink);
      color: var(--bg-card);
      border-bottom-right-radius: 4px;
    }
    .chat-bubble-assistant {
      background: var(--line-soft);
      color: var(--ink);
      border-bottom-left-radius: 4px;
    }
    .chat-bubble-assistant.is-error {
      background: #fdf0f0;
      color: #8a1a1a;
    }
    .chat-bubble:empty { display: none; }
    .chat-img-tag {
      font-size: 0.78rem;
      color: var(--ink-mute);
    }
    .chat-typing {
      align-self: flex-start;
      padding: 0.55rem 0.95rem;
      border-radius: 16px;
      background: var(--line-soft);
      color: var(--ink-mute);
      font-size: 0.85rem;
      font-style: italic;
      animation: chat-pulse 1.4s ease-in-out infinite;
    }
    @keyframes chat-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .chat-recipe-card {
      align-self: flex-start;
      max-width: 92%;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0.95rem 1.1rem;
      margin-top: 0.1rem;
    }
    .chat-recipe-card.is-published {
      border-color: var(--healthier);
      background: var(--healthier-soft);
    }
    .chat-recipe-head {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }
    .chat-recipe-emoji { font-size: 1.4rem; line-height: 1; }
    .chat-recipe-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.005em;
    }
    .chat-recipe-summary {
      color: var(--ink-soft);
      font-size: 0.85rem;
      font-style: italic;
      margin-bottom: 0.35rem;
      line-height: 1.45;
    }
    .chat-recipe-meta {
      font-size: 0.72rem;
      color: var(--ink-mute);
      margin-bottom: 0.7rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .chat-recipe-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.55rem;
      align-items: center;
    }
    .chat-recipe-status {
      color: var(--healthier);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .chat-recipe-btn {
      padding: 0.5rem 0.95rem;
      border-radius: 999px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-soft);
      transition: all 0.15s;
    }
    .chat-recipe-btn:hover { color: var(--ink); border-color: var(--ink); }
    .chat-recipe-btn.is-primary {
      background: var(--ink);
      color: var(--bg-card);
      border-color: var(--ink);
    }
    .chat-recipe-btn.is-primary:hover { background: #3a2e28; }
    .chat-recipe-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-input-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding-top: 0.85rem;
      padding-bottom: 0.5rem;
      border-top: 1px solid var(--line);
      margin-top: 0.5rem;
    }
    .chat-attachment-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      background: var(--accent-soft);
      border-radius: 999px;
      font-size: 0.78rem;
      color: var(--ink);
      margin-bottom: 0.45rem;
    }
    .chat-attachment-pill button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-soft);
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
      margin-left: 0.15rem;
    }
    .chat-input-bar textarea {
      width: 100%;
      min-height: 50px;
      max-height: 150px;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.92rem;
      background: var(--bg-card);
      color: var(--ink);
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .chat-input-bar textarea:focus { border-color: var(--accent); }
    .chat-input-bar textarea:disabled { opacity: 0.6; }
    .chat-input-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.55rem;
    }
    .chat-photo-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .chat-photo-btn:hover { color: var(--ink); border-color: var(--ink); }
    /* ---------- Recipe page ---------- */
    .recipe-head {
      text-align: center;
      margin-bottom: 1.75rem;
      padding: 0 0.25rem;
    }
    .recipe-emoji {
      font-size: 2.6rem;
      line-height: 1;
      margin-bottom: 0.75rem;
    }
    .recipe-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 5.5vw, 2.4rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }
    .recipe-summary {
      color: var(--ink-soft);
      font-size: 0.95rem;
      font-style: italic;
      max-width: 40ch;
      margin: 0 auto;
    }
    /* Scaler */
    .scaler {
      margin: 1.5rem 0 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    .servings-pill {
      display: inline-flex;
      align-items: center;
      background: var(--line-soft);
      border-radius: 999px;
      padding: 4px;
      gap: 2px;
      max-width: 100%;
    }
    .pill-btn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: transparent;
      border: none;
      color: var(--ink);
      font-size: 1.3rem;
      font-weight: 400;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
      flex-shrink: 0;
      padding: 0;
    }
    .pill-btn:hover:not(:disabled) { background: rgba(0, 0, 0, 0.06); }
    .pill-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pill-count {
      padding: 0 1.15rem;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--ink);
      white-space: nowrap;
      min-width: 7rem;
      text-align: center;
    }
    .scaler-sub {
      font-size: 0.8rem;
      color: var(--ink-soft);
      text-align: center;
      line-height: 1.35;
    }
    /* Recipe-head actions row */
    .recipe-head-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .alternate-button {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .alternate-button:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .alternate-subtle {
      display: inline-block;
      color: var(--ink-soft);
      text-decoration: none;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--line);
      padding: 0 0 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .alternate-subtle:hover {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }
    button.alternate-subtle {
      background: none;
      border: none;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 0 0 1px;
    }
    button.alternate-subtle:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    /* Untested chip */
    .untested-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--ink-soft);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      vertical-align: middle;
      margin-left: 0.55rem;
      white-space: nowrap;
      line-height: 1.2;
    }
    /* Section dividers */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 2rem 0 1rem;
      padding-bottom: 0.55rem;
      border-bottom: 2px solid var(--ink);
    }
    .section-divider-emoji {
      font-size: 1.35rem;
      line-height: 1;
    }
    .section-divider-text {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
    }
    /* Ingredients list */
    .ingredients {
      list-style: none;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.25rem 1rem;
    }
    .ingredients li {
      border-bottom: 1px solid var(--line-soft);
    }
    .ingredients li:last-child { border-bottom: none; }
    .ingredient-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.7rem 0;
      cursor: pointer;
      user-select: none;
    }
    .ingredient-check {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--ink-mute);
      border-radius: 4px;
      margin: 0;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      background: var(--bg-card);
      transition: background 0.15s, border-color 0.15s;
    }
    .ingredient-check:hover { border-color: var(--accent); }
    .ingredient-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .ingredient-check:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 0px;
      width: 6px;
      height: 11px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg);
    }
    .ingredient-text {
      font-size: 0.94rem;
      line-height: 1.4;
      flex: 1;
      transition: color 0.15s;
    }
    .ingredients li.is-checked .ingredient-text {
      color: var(--ink-mute);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }
    .ingredient-amount { font-weight: 600; color: var(--ink); }
    .ingredient-metric { color: var(--ink-mute); font-size: 0.88em; }
    .ingredient-name { color: var(--ink); }
    .ingredients li.is-checked .ingredient-amount,
    .ingredients li.is-checked .ingredient-name { color: var(--ink-mute); }
    /* Method list */
    .method {
      list-style: none;
      counter-reset: step;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .method li {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 1rem 1.1rem 1rem 3.1rem;
      position: relative;
      font-size: 0.96rem;
      line-height: 1.55;
      counter-increment: step;
    }
    .method li::before {
      content: counter(step);
      position: absolute;
      left: 1rem;
      top: 0.95rem;
      width: 1.6rem;

    // Canonical recipes shown on the home page.

    // ============================================================
    // Formatting
    // ============================================================
    const VULGAR_FRACTIONS = [
      [1/8, '⅛'], [1/4, '¼'], [1/3, '⅓'], [3/8, '⅜'],
      [1/2, '½'], [5/8, '⅝'], [2/3, '⅔'], [3/4, '¾'], [7/8, '⅞'],
    ];

    function formatAmount(v) {
      if (v == null || isNaN(v)) return '';
      if (v === 0) return '0';
      const whole = Math.floor(v);
      const frac = v - whole;
      const tolerance = 0.04;
      if (frac < tolerance) return String(whole);
      if (frac > 1 - tolerance) return String(whole + 1);
      let best = null, bestDiff = tolerance;
      for (const [val, sym] of VULGAR_FRACTIONS) {
        const diff = Math.abs(frac - val);
        if (diff < bestDiff) { bestDiff = diff; best = sym; }
      }
      if (best) return whole ? `${whole}${best}` : best;
      const rounded = Math.round(v * 100) / 100;
      return String(rounded).replace(/\.?0+$/, '');
    }

    function formatMetric(v) {
      if (v == null || isNaN(v)) return '';
      if (v < 1) return (Math.round(v * 10) / 10).toString();
      if (v < 20) return String(Math.round(v * 2) / 2);
      if (v < 100) return String(Math.round(v));
      return String(Math.round(v / 5) * 5);
    }

    function pluralize(ing, scaledAmount) {
      if (scaledAmount > 1 && ing.plural) return ing.plural;
      return ing.name;
    }

    function renderIngredient(ing, multiplier, mode) {
      const amount = ing.amount * multiplier;
      const metric = ing.metric != null ? ing.metric * multiplier : null;
      const name = pluralize(ing, amount);
      if (mode === 'metric') {
        if (metric == null) return `<span class="ingredient-name">${escapeHtml(name)}</span>`;
        return (
          `<span class="ingredient-amount">${formatMetric(metric)}${ing.metricUnit}</span> ` +
          `<span class="ingredient-name">${escapeHtml(name)}</span>`
        );
      }
      if (!ing.unit) return `<span class="ingredient-name">${escapeHtml(name)}</span>`;
      return (
        `<span class="ingredient-amount">${formatAmount(amount)} ${ing.unit}</span> ` +
        `<span class="ingredient-name">${escapeHtml(name)}</span>`
      );
    }

    function renderIngredientInline(ing, multiplier, mode) {
      const amount = ing.amount * multiplier;
      const metric = ing.metric != null ? ing.metric * multiplier : null;
      const name = pluralize(ing, amount);
      if (mode === 'metric') {
        if (metric == null) return escapeHtml(name);
        return `${formatMetric(metric)}${ing.metricUnit} ${escapeHtml(name)}`;
      }
      if (!ing.unit) return escapeHtml(name);
      return `${formatAmount(amount)} ${ing.unit} ${escapeHtml(name)}`;
    }

    function renderMethodStep(step, ingredients, multiplier, mode) {
      const byId = Object.fromEntries(ingredients.map(i => [i.id, i]));
      return step.replace(/\{(\w+)\}/g, (_, id) => {
        const ing = byId[id];
        if (!ing) return `{${id}}`;
        return `<strong>${renderIngredientInline(ing, multiplier, mode)}</strong>`;
      });
    }

    function computeCaloriesPerServing(recipe) {
      if (recipe.nutrition && recipe.nutrition.caloriesPerServing != null) {
        return recipe.nutrition.caloriesPerServing;
      }
      const total = recipe.ingredients.reduce((s, i) => s + (i.calories || 0), 0);
      return Math.round(total / recipe.defaultServings);
    }

    function computeMacrosPerServing(recipe) {
      if (recipe.nutrition && recipe.nutrition.macros) {
        return recipe.nutrition.macros;
      }
      const totals = recipe.ingredients.reduce((acc, i) => ({
        carbs:   acc.carbs   + (i.carbs   || 0),
        protein: acc.protein + (i.protein || 0),
        fat:     acc.fat     + (i.fat     || 0),
      }), { carbs: 0, protein: 0, fat: 0 });
      return {
        carbs:   Math.round(totals.carbs   / recipe.defaultServings),
        protein: Math.round(totals.protein / recipe.defaultServings),
        fat:     Math.round(totals.fat     / recipe.defaultServings),
      };
    }

    function fmtMacro(n) {
      const r = Math.round(n * 10) / 10;
      return r === Math.round(r) ? String(Math.round(r)) : r.toFixed(1);
    }

      return String(s)

    async function fileToBase64(file) {
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);
      let binary = '';
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function extractRecipeFromText(text) {
      const match = String(text).match(/```recipe\s*\n([\s\S]*?)\n```/);
      if (!match) return null;
      try { return JSON.parse(match[1]); } catch (e) { return null; }
    }
    function stripRecipeBlock(text) {
      return String(text).replace(/```recipe\s*\n[\s\S]*?\n```/g, '').trim();
    }
    function userMessageText(content) {
      if (typeof content === 'string') return content;
      const t = (content || []).find((c) => c.type === 'text');
      return t ? t.text : '';
    }
    function userMessageHasImage(content) {
      return Array.isArray(content) && content.some((c) => c.type === 'image');
    }

    function renderAdd(editSlug) {
      if (!isAdmin()) { window.location.hash = '#/'; return; }
      backLink.classList.remove('hidden');

      const editingRecipe = editSlug && RECIPES[editSlug] ? RECIPES[editSlug] : null;
      let messages = [];
      if (editingRecipe) {
        const intro =
          `Here's the current "${editingRecipe.name}" recipe. Tell me what you'd like to change — or hit Publish to keep it as-is.\n\n` +
          '```recipe\n' + JSON.stringify(editingRecipe, null, 2) + '\n```';
        messages = [{ role: 'assistant', content: intro }];
      }
      let isWaiting = false;
      let pendingImage = null;
      let publishedSlugs = new Set();
      let publishingIdx = null;

      function paint() {
        const empty = messages.length === 0 && !isWaiting;
        viewEl.innerHTML = `
          <div class="chat-page">
            <header class="chat-head">
              <h2>${editingRecipe ? 'Edit ' + escapeHtml(editingRecipe.name) : 'Add a recipe'}</h2>
              <p class="add-sub">${editingRecipe ? 'Chat with Claude to refine. Publishing overwrites the existing recipe.' : 'Chat with Claude to draft a recipe. When you\'re happy with one, hit Publish on its card and it\'ll appear on the home page.'}</p>
            </header>
            <div class="chat-messages" id="chatMessages">
              ${empty ? '<div class="chat-empty">Tell Claude what you want to make. Describe ingredients, or upload a photo of a recipe.</div>' : renderMessages()}
              ${isWaiting ? '<div class="chat-typing">Claude is thinking…</div>' : ''}
            </div>
            <div class="chat-input-bar">
              ${pendingImage ? `<div class="chat-attachment-pill">📷 ${escapeHtml(pendingImage.name)} <button type="button" id="clearAttach" aria-label="Remove">×</button></div>` : ''}
              <textarea id="chatInput" placeholder="${messages.length === 0 ? 'e.g. Croissants — 330g flour, 75g butter for laminating…' : 'Refine, ask, or describe another recipe…'}"${isWaiting ? ' disabled' : ''}></textarea>
              <div class="chat-input-actions">
                <label class="chat-photo-btn" for="chatPhoto">📷 Photo<input id="chatPhoto" type="file" accept="image/*" hidden /></label>
                <button class="add-generate" id="chatSend" type="button"${isWaiting ? ' disabled' : ''}>${isWaiting ? 'Sending…' : 'Send'}</button>
              </div>
            </div>
          </div>
        `;

        const msgEl = document.getElementById('chatMessages');
        if (msgEl) msgEl.scrollTop = msgEl.scrollHeight;

        const sendBtn = document.getElementById('chatSend');
        const inputEl = document.getElementById('chatInput');
        sendBtn.addEventListener('click', send);
        inputEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
        if (!isWaiting) inputEl.focus();

        document.getElementById('chatPhoto').addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          pendingImage = { data: await fileToBase64(file), type: file.type || 'image/jpeg', name: file.name };
          paint();
        });
        const clearBtn = document.getElementById('clearAttach');
        if (clearBtn) clearBtn.addEventListener('click', () => { pendingImage = null; paint(); });

        document.querySelectorAll('[data-publish-idx]').forEach((btn) => {
          btn.addEventListener('click', () => publish(parseInt(btn.dataset.publishIdx, 10)));
        });
        document.querySelectorAll('[data-skip]').forEach((btn) => {
          btn.addEventListener('click', () => {
            btn.closest('.chat-recipe-card').style.opacity = '0.5';
            btn.closest('.chat-recipe-card').querySelectorAll('button').forEach((b) => b.disabled = true);
          });
        });
      }

      function renderMessages() {
        return messages.map((m, idx) => {
          if (m.role === 'user') {
            const text = userMessageText(m.content);
            const hasImg = userMessageHasImage(m.content);
            return `<div class="chat-msg chat-msg-user">
              ${hasImg ? '<div class="chat-img-tag">📷 image attached</div>' : ''}
              ${text ? `<div class="chat-bubble chat-bubble-user">${escapeHtml(text)}</div>` : ''}
            </div>`;
          }
          const text = typeof m.content === 'string' ? m.content : '';
          const isError = m._error === true;
          const recipe = extractRecipeFromText(text);
          const prose = stripRecipeBlock(text);
          let html = `<div class="chat-msg chat-msg-assistant">`;
          if (prose) {
            html += `<div class="chat-bubble chat-bubble-assistant${isError ? ' is-error' : ''}">${escapeHtml(prose)}</div>`;
          }
          if (recipe) {
            const isPub = publishedSlugs.has(recipe.slug);
            const isPublishing = publishingIdx === idx;
            html += `<div class="chat-recipe-card${isPub ? ' is-published' : ''}">
              <div class="chat-recipe-head">
                <span class="chat-recipe-emoji">${recipe.emoji || '🍽️'}</span>
                <span class="chat-recipe-name">${escapeHtml(recipe.name || '(untitled)')}</span>
              </div>
              <p class="chat-recipe-summary">${escapeHtml(recipe.summary || '')}</p>
              <p class="chat-recipe-meta">Makes ${recipe.defaultServings} ${escapeHtml(recipe.servingLabelPlural || '')} · ${(recipe.ingredients || []).length} ingredients · ${(recipe.method || []).length} steps</p>
              <div class="chat-recipe-actions">
                ${isPub
                  ? '<span class="chat-recipe-status">✓ Published</span>'
                  : `<button class="chat-recipe-btn" type="button" data-skip="1"${isPublishing ? ' disabled' : ''}>Skip</button>
                     <button class="chat-recipe-btn is-primary" type="button" data-publish-idx="${idx}"${isPublishing ? ' disabled' : ''}>${isPublishing ? 'Publishing…' : 'Publish'}</button>`}
              </div>
            </div>`;
          }
          html += `</div>`;
          return html;
        }).join('');
      }

      async function send() {
        const inputEl = document.getElementById('chatInput');
        const text = inputEl.value.trim();
        if (!text && !pendingImage) return;

        const content = [];
        if (pendingImage) {
          content.push({ type: 'image', source: { type: 'base64', media_type: pendingImage.type, data: pendingImage.data } });
        }
        if (text) content.push({ type: 'text', text });

        messages.push({ role: 'user', content });
        pendingImage = null;
        isWaiting = true;
        paint();

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken() },
            body: JSON.stringify({ messages }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
          messages.push({ role: 'assistant', content: data.message.content });
        } catch (err) {
          messages.push({ role: 'assistant', content: '⚠️ ' + err.message, _error: true });
        } finally {
          isWaiting = false;
          paint();
        }
      }

      async function publish(idx) {
        const m = messages[idx];
        if (!m || m.role !== 'assistant') return;
        const recipe = extractRecipeFromText(m.content);
        if (!recipe) return;

        publishingIdx = idx;
        paint();
        try {
          const res = await fetch('/api/recipes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken() },
            body: JSON.stringify({ recipe }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
          publishedSlugs.add(recipe.slug);
          RECIPES[recipe.slug] = recipe;
          if (!HOME_RECIPE_SLUGS.includes(recipe.slug)) HOME_RECIPE_SLUGS.push(recipe.slug);
        } catch (err) {
          alert('Publish failed: ' + err.message);
        } finally {
          publishingIdx = null;
          paint();
        }
      }

      paint();
      document.title = "Add a recipe · Joelle's Recipes";
      window.scrollTo(0, 0);
    }

    function renderAdminLogin() {

            <form id="adminForm" class="add-form" autocomplete="off">

              <div class="add-form-footer" style="justify-content: flex-end;">
                <button class="add-generate" type="submit"${isSubmitting ? ' disabled' : ''}>${isSubmitting ? 'Checking…' : 'Unlock'}</button>
              </div>
            </form>
          </div>
        `;

        if (loggedIn) {
          document.getElementById('logoutBtn').addEventListener('click', () => {
            clearAdmin();
            window.location.hash = '#/';
          });
        } else {
          document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('adminCode').value;
            if (!code) return;
            isSubmitting = true;
            errorMsg = '';
            paint();
            try {
              const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: code }),
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
              try { localStorage.setItem(ADMIN_TOKEN_KEY, code); } catch (e) {}
              window.location.hash = '#/';
            } catch (err) {
              isSubmitting = false;
              errorMsg = err.message;
              paint();
            }
          });
        }
      }

      paint();
      document.title = "Admin · Joelle's Recipes";
      window.scrollTo(0, 0);
    }

    async function loadDynamicRecipes() {
      try {
        const res = await fetch('/api/recipes');
        if (!res.ok) return;
        const data = await res.json();
        for (const r of (data.recipes || [])) {
          if (!r || !r.slug) continue;
          RECIPES[r.slug] = r;
          if (!HOME_RECIPE_SLUGS.includes(r.slug)) HOME_RECIPE_SLUGS.push(r.slug);
        }
      } catch (e) { /* ignore */ }
    }

    function renderRecipe(slug) {
      const r = RECIPES[slug];
      if (!r) { window.location.hash = '#/'; return; }

      backLink.classList.remove('hidden');
      const options = SCALES[r.scale] || SCALES.normal;
      const state = { servings: r.defaultServings };
      let currentTab = 'ingredients';
      let checked = getChecked(slug);

      function paint() {
        const multiplier = state.servings / r.defaultServings;
        const servingWord = state.servings === 1 ? r.servingLabel : r.servingLabelPlural;
        const perServing = computeCaloriesPerServing(r);
        const totalCalories = Math.round(perServing * state.servings);
        const macros = computeMacrosPerServing(r);

        const ingredientsHtml = r.ingredients.map(ing => {
          const isCh = checked.has(ing.id);
          return `<li class="${isCh ? 'is-checked' : ''}">
            <label class="ingredient-row">
              <input type="checkbox" class="ingredient-check" ${isCh ? 'checked' : ''} data-id="${ing.id}" />
              <span class="ingredient-text">${renderIngredient(ing, multiplier, unitMode)}</span>
            </label>
          </li>`;
        }).join('');

        const methodHtml = r.method.map(step =>
          `<li>${renderMethodStep(step, r.ingredients, multiplier, unitMode)}</li>`
        ).join('');

        const alt = r.alternate;
        const activeCls = (val) => currentTab === val ? ' is-active' : '';
        const activeUnit = (u) => unitMode === u ? ' is-active' : '';
        const idx = options.indexOf(state.servings);

        viewEl.innerHTML = `
          <article>
            <header class="recipe-head">
              <div class="recipe-emoji" aria-hidden="true">${r.emoji}</div>
              <h1 class="recipe-name">${escapeHtml(r.name)}${r.untested ? ' <span class="untested-badge">🧪 Untested</span>' : ''}</h1>
              <p class="recipe-summary">${escapeHtml(r.summary)}</p>
              ${(alt || isAdmin()) ? `<div class="recipe-head-actions">
                ${alt ? `<a class="alternate-button" href="#/recipe/${alt.slug}">${escapeHtml(alt.label)} →</a>` : ''}
                ${isAdmin() ? `<a class="alternate-subtle" href="#/add/${slug}">✏️ Edit</a>` : ''}
                ${isAdmin() ? `<button class="alternate-subtle" id="toggleTestedBtn" type="button">${r.untested ? '✓ Mark as tested' : '🧪 Mark as untested'}</button>` : ''}
              </div>` : ''}
            </header>

            <div class="scaler" role="group" aria-label="Serving size">
              <div class="servings-pill">
                <button class="pill-btn" data-step="dec" type="button" aria-label="Fewer servings"${idx <= 0 ? ' disabled' : ''}>−</button>
                <span class="pill-count" id="servingsText">${state.servings} ${servingWord}</span>
                <button class="pill-btn" data-step="inc" type="button" aria-label="More servings"${idx >= options.length - 1 ? ' disabled' : ''}>+</button>
              </div>
              <div class="scaler-sub">🔥 ~${perServing} kcal per ${escapeHtml(r.servingLabel)}</div>
            </div>

            <div class="tabs" role="tablist">
              <button class="tab${activeCls('ingredients')}" data-tab="ingredients" role="tab">Ingredients</button>
              <button class="tab${activeCls('method')}" data-tab="method" role="tab">Method</button>
              <button class="tab${activeCls('nutrition')}" data-tab="nutrition" role="tab">Nutrition</button>
            </div>

            <div class="tab-panel${activeCls('ingredients')}" data-panel="ingredients">
              <div class="unit-toggle" role="tablist" aria-label="Measurement units">
                <button class="unit-btn${activeUnit('us')}" data-unit="us" type="button">US</button>
                <button class="unit-btn${activeUnit('metric')}" data-unit="metric" type="button">Metric</button>
              </div>
              <ul class="ingredients">${ingredientsHtml}</ul>
            </div>

            <div class="tab-panel${activeCls('method')}" data-panel="method">
              <ol class="method">${methodHtml}</ol>
            </div>

            <div class="tab-panel${activeCls('nutrition')}" data-panel="nutrition">
              <div class="nutrition-card">
                <div class="nutrition-row">
                  <div class="nutrition-row-head">
                    <span class="nutrition-label">Per ${escapeHtml(r.servingLabel)}</span>
                    <span class="nutrition-value">~${perServing} kcal</span>
                  </div>
                  <div class="nutrition-macros">
                    <span class="nutrition-macro"><strong>${fmtMacro(macros.carbs)}g</strong> carbs</span>
                    <span class="nutrition-macro"><strong>${fmtMacro(macros.protein)}g</strong> protein</span>
                    <span class="nutrition-macro"><strong>${fmtMacro(macros.fat)}g</strong> fat</span>
                  </div>
                </div>
                <div class="nutrition-row">
                  <div class="nutrition-row-head">
                    <span class="nutrition-label">Full batch · ${state.servings} ${servingWord}</span>
                    <span class="nutrition-value">~${totalCalories} kcal</span>
                  </div>
                  <div class="nutrition-macros">
                    <span class="nutrition-macro"><strong>${fmtMacro(macros.carbs * state.servings)}g</strong> carbs</span>
                    <span class="nutrition-macro"><strong>${fmtMacro(macros.protein * state.servings)}g</strong> protein</span>
                    <span class="nutrition-macro"><strong>${fmtMacro(macros.fat * state.servings)}g</strong> fat</span>
                  </div>
                </div>
              </div>
            </div>
          </article>
        `;

        document.querySelectorAll('.pill-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const i = options.indexOf(state.servings);
            const next = btn.dataset.step === 'inc' ? i + 1 : i - 1;
            if (next >= 0 && next < options.length) {
              state.servings = options[next];
              paint();
            }
          });
        });

        document.querySelectorAll('.tab').forEach(btn => {
          btn.addEventListener('click', () => {
            currentTab = btn.dataset.tab;
            document.querySelectorAll('.tab').forEach(b =>
              b.classList.toggle('is-active', b.dataset.tab === currentTab)
            );
            document.querySelectorAll('.tab-panel').forEach(p =>
              p.classList.toggle('is-active', p.dataset.panel === currentTab)
            );
          });
        });

        document.querySelectorAll('.unit-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            if (btn.dataset.unit !== unitMode) {
              unitMode = btn.dataset.unit;
              try { localStorage.setItem(UNIT_KEY, unitMode); } catch (e) {}
              paint();
            }
          });
        });

        document.querySelectorAll('.ingredient-check').forEach(cb => {
          cb.addEventListener('change', () => {
            const id = cb.dataset.id;
            if (cb.checked) checked.add(id); else checked.delete(id);
            setChecked(slug, checked);
            cb.closest('li').classList.toggle('is-checked', cb.checked);
          });
        });

        const toggleBtn = document.getElementById('toggleTestedBtn');
        if (toggleBtn) {
          toggleBtn.addEventListener('click', async () => {
            toggleBtn.disabled = true;
            toggleBtn.textContent = 'Saving…';
            const newUntested = !r.untested;
            const payload = { ...r, slug };
            if (newUntested) payload.untested = true;
            else delete payload.untested;
            try {
              const res = await fetch('/api/recipes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken() },
                body: JSON.stringify({ recipe: payload }),
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
              if (newUntested) r.untested = true;
              else delete r.untested;
              RECIPES[slug] = r;
              paint();
            } catch (err) {
              alert('Failed to save: ' + err.message);
              toggleBtn.disabled = false;
              toggleBtn.textContent = r.untested ? '✓ Mark as tested' : '🧪 Mark as untested';
            }
          });
        }
      }

      paint();
      document.title = `${r.name} · Joelle's Recipes`;
      window.scrollTo(0, 0);
    }

    // ============================================================
    // Router
    // ============================================================
    function route() {
      const hash = window.location.hash || '#/';

      if (hash === '#admin' || hash === '#admin/on') {
        renderAdminLogin();
        return;
      }
      if (hash === '#admin/off') {
        clearAdmin();
        window.location.hash = '#/';
        return;
      }

      const addMatch = hash.match(/^#\/add(?:\/([a-z0-9-]+))?$/);
      if (addMatch) { renderAdd(addMatch[1]); return; }

      const match = hash.match(/^#\/recipe\/([a-z0-9-]+)$/);
      if (match) {
        renderRecipe(match[1]);
      } else {
        renderHome();
      }
    }

    window.addEventListener('hashchange', route);
    route();

    loadDynamicRecipes().then(() => {
      if ((window.location.hash || '#/') === '#/') renderHome();
    });
  </script>
</body>
</html>
