<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Recipe Book</title><style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#faf8f4;color:#1a1a1a;min-height:100vh}.app{max-width:720px;margin:0 auto;padding:2rem 1rem}header{text-align:center;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:2px solid #1a1a1a}header h1{font-family:'Playfair Display',serif;font-size:2.8rem;letter-spacing:-1px;line-height:1}header p{font-size:.85rem;color:#888;margin-top:.4rem;font-weight:300;letter-spacing:.05em;text-transform:uppercase}.add-form{background:#fff;border:1.5px solid #1a1a1a;border-radius:2px;padding:1.5rem;margin-bottom:2rem}.add-form h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1rem}.form-group{margin-bottom:1rem}label{display:block;font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:.4rem}input[type="text"],textarea{width:100%;padding:.6rem .8rem;border:1px solid #ddd;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.9rem;background:#faf8f4;outline:none;transition:border-color .2s}input[type="text"]:focus,textarea:focus{border-color:#1a1a1a}textarea{min-height:90px;resize:vertical;line-height:1.6}.hint{font-size:.72rem;color:#aaa;margin-top:.3rem}.btn-add{background:#1a1a1a;color:#fff;border:none;padding:.7rem 1.8rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;letter-spacing:.05em;cursor:pointer;border-radius:2px;transition:background .2s}.btn-add:hover{background:#333}.recipes-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem}.recipes-header h2{font-family:'Playfair Display',serif;font-size:1.4rem}.count{font-size:.8rem;color:#aaa;font-weight:300}.empty{text-align:center;padding:3rem 1rem;color:#bbb;font-size:.9rem;border:1.5px dashed #ddd;border-radius:2px;font-style:italic}.recipe-card{background:#fff;border:1.5px solid #e8e3db;border-radius:2px;margin-bottom:1rem;overflow:hidden;transition:border-color .2s}.recipe-card:hover{border-color:#1a1a1a}.card-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;user-select:none}.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}.card-meta{font-size:.75rem;color:#aaa;margin-top:.15rem;font-weight:300}.card-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}.btn-toggle{background:none;border:1px solid #ddd;border-radius:2px;padding:.3rem .7rem;font-size:.75rem;cursor:pointer;color:#555;font-family:'DM Sans',sans-serif;transition:all .2s}.btn-toggle:hover{border-color:#1a1a1a;color:#1a1a1a}.btn-delete{background:none;border:1px solid #f0d0d0;border-radius:2px;padding:.3rem .7rem;font-size:.75rem;cursor:pointer;color:#c0392b;font-family:'DM Sans',sans-serif;transition:all .2s}.btn-delete:hover{background:#c0392b;color:#fff;border-color:#c0392b}.card-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid #f0ebe3}.card-body.open{display:block}.section-label{font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#888;margin:1rem 0 .5rem}.ingredients-list{list-style:none;padding:0}.ingredients-list li{font-size:.88rem;padding:.3rem 0;border-bottom:1px solid #f5f0ea;display:flex;align-items:flex-start;gap:.5rem;line-height:1.4}.ingredients-list li::before{content:'—';color:#ccc;flex-shrink:0;margin-top:1px}.method-list{list-style:none;padding:0;counter-reset:steps}.method-list li{font-size:.88rem;padding:.4rem 0 .4rem 2rem;border-bottom:1px solid #f5f0ea;position:relative;line-height:1.5;counter-increment:steps}.method-list li::before{content:counter(steps);position:absolute;left:0;top:.4rem;font-family:'Playfair Display',serif;font-size:.75rem;color:#bbb;font-weight:700}.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:.6rem 1.4rem;border-radius:2px;font-size:.82rem;opacity:0;transition:all .3s ease;pointer-events:none;z-index:999}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}</style></head><body><div class="app"><header><h1>My Recipe Book</h1><p>All your recipes in one place</p></header><div class="add-form"><h2>+ Add New Recipe</h2><div class="form-group"><label>Recipe Name</label><input type="text" id="recipeName" placeholder="e.g. Chocolate Chip Bread"/></div><div class="form-group"><label>Ingredients</label><textarea id="recipeIngredients" placeholder="One ingredient per line"></textarea><div class="hint">One ingredient per line</div></div><div class="form-group"><label>Method</label><textarea id="recipeMethod" placeholder="One step per line"></textarea><div class="hint">One step per line</div></div><button class="btn-add" onclick="addRecipe()">Save Recipe</button></div><div class="recipes-header"><h2>Saved Recipes</h2><span class="count" id="recipeCount">0 recipes</span></div><div id="recipeList"></div></div><div class="toast" id="toast"></div><script>let recipes=[];const SEED_RECIPES=[{id:2,name:'Banana Chocolate Chip Bread',ingredients:['2¾ cups (325g) very ripe mashed banana (~3 medium or 4 small)','½ cup (183g) honey','⅓ cup (75g) sugar or 4 tbsp (8g) stevia','1½ tsp vanilla extract','2 eggs','3 tbsp (45ml) olive oil','2 cups (250g) all-purpose flour','1½ tsp baking soda','½ tsp cinnamon','¼ tsp salt','¼ tsp nutmeg (optional)','214g Hershey\'s milk chocolate chips','——','Per slice with sugar: 261 kcal · 4.2g P · 11.8g F · 37.8g C · 23.4g sugar','Per slice with stevia: 241 kcal · 4.2g P · 11.8g F · 33.8g C · 21.4g sugar'],method:['Preheat oven to 175°C. Line a large loaf tin with parchment.','Mash 325g (~3 medium or 4 small) very ripe bananas very well — the blacker the better.','Add 183g honey, ⅓ cup (75g) sugar or 4 tbsp stevia, 1½ tsp vanilla and 2 eggs. Whisk until combined.','Stir in 3 tbsp (45ml) olive oil until smooth.','Fold in 250g flour, 1½ tsp baking soda, ½ tsp cinnamon, ¼ tsp salt and ¼ tsp nutmeg (if using) until just combined — do not overmix.','Fold in half the chocolate chips (107g).','Pour into lined loaf tin, smooth the top and scatter remaining 107g chocolate chips on top.','Bake at 175°C for 55–65 minutes until toothpick comes out with moist crumbs. Check every 10 minutes if not ready.','Cool in tin 15 minutes, transfer to wire rack. Best sliced once fully cool.'],date:'10 Jun 2026'},{id:1,name:'Croissants',servings:'Makes 6',ingredients:['1¾ cups (330g) all-purpose flour','1 tsp (3g) instant yeast','2 tbsp (30g) sugar','1 tsp (6g) salt','1½ tbsp (20g) butter, softened','¾ cup (170ml) lukewarm water','5 tbsp (75g) cold butter, for laminating','1 egg + 1 tbsp milk, for egg wash','——','Per croissant: 334 kcal · 5.8g protein · 13.4g fat · 46.8g carbs'],method:['Mix 170ml lukewarm water, 1 tsp (3g) yeast and 2 tbsp (30g) sugar together. Add 330g flour, 1 tsp (6g) salt and 20g softened butter. Mix until dough comes together and knead until smooth — stretch test, if it doesn\'t tear it\'s ready. Cover and rest 15 minutes at room temp.','Place 75g cold butter in a zip bag and roll into a flat square — pliable but still cold.','On a floured surface roll out the dough, place butter in the centre and seal it in. Do 1 double fold + 1 single fold. If kitchen is warm chill briefly between folds. Cover and refrigerate 30 minutes.','Roll dough out again and cut into 3 strips, then cut each strip into 2 triangles — 6 pieces total. Roll each triangle into a croissant shape, not too tight. Place on a parchment-lined tray.','Cover and proof until puffy and jiggly — about 1 hour.','Brush generously with egg wash (1 egg beaten with 1 tbsp milk).','Bake at 200°C for 3 minutes, then reduce to 180°C for 20 minutes until deep golden. Do not open the oven while baking.'],date:'6 Jun 2026'}];function loadRecipes(){try{const saved=localStorage.getItem('joelle_recipes');if(saved){recipes=JSON.parse(saved)}const seeded=JSON.parse(localStorage.getItem('joelle_seeded')||'[]');SEED_RECIPES.forEach(s=>{if(!seeded.includes(s.id)&&!recipes.find(r=>r.id===s.id)){recipes.push(s);seeded.push(s.id)}});localStorage.setItem('joelle_seeded',JSON.stringify(seeded));renderRecipes()}catch(e){recipes=[]}}function saveRecipes(){try{localStorage.setItem('joelle_recipes',JSON.stringify(recipes))}catch(e){showToast('Could not save')}}function addRecipe(){const name=document.getElementById('recipeName').value.trim();const ingredients=document.getElementById('recipeIngredients').value.trim();const method=document.getElementById('recipeMethod').value.trim();if(!name||!ingredients||!method){showToast('Please fill in all fields');return}const recipe={id:Date.now(),name,ingredients:ingredients.split('\n').filter(l=>l.trim()),method:method.split('\n').filter(l=>l.trim()),date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})};recipes.unshift(recipe);saveRecipes();renderRecipes();document.getElementById('recipeName').value='';document.getElementById('recipeIngredients').value='';document.getElementById('recipeMethod').value='';showToast('Recipe saved!')}function deleteRecipe(id){if(!confirm('Delete this recipe?'))return;recipes=recipes.filter(r=>r.id!==id);saveRecipes();renderRecipes();showToast('Recipe deleted')}function toggleRecipe(id){const body=document.getElementById('body_'+id);const btn=document.getElementById('toggle_'+id);if(body.classList.contains('open')){body.classList.remove('open');btn.textContent='View'}else{body.classList.add('open');btn.textContent='Hide'}}function renderRecipes(){const list=document.getElementById('recipeList');const count=document.getElementById('recipeCount');count.textContent=recipes.length+' recipe'+(recipes.length!==1?'s':'');if(recipes.length===0){list.innerHTML='<div class="empty">No recipes yet — add your first one above!</div>';return}list.innerHTML=recipes.map(r=>`<div class="recipe-card"><div class="card-header"><div><div class="card-title">${r.name}</div><div class="card-meta">Added ${r.date} &middot; ${r.ingredients.length} ingredients &middot; ${r.method.length} steps</div></div><div class="card-actions"><button class="btn-toggle" id="toggle_${r.id}" onclick="toggleRecipe(${r.id})">View</button><button class="btn-delete" onclick="deleteRecipe(${r.id})">Delete</button></div></div><div class="card-body" id="body_${r.id}"><div class="section-label">Ingredients</div><ul class="ingredients-list">${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul><div class="section-label">Method</div><ol class="method-list">${r.method.map(s=>`<li>${s}</li>`).join('')}</ol></div></div>`).join('')}function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}loadRecipes();</script></body></html>
